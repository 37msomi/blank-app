[theme]
primaryColor = "#0066cc"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "warning"

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[server]
runOnSave = true
headless = true
enableCORS = false
enableXsrfProtection = true

[runtime]
strictUnicodeCheck = true
